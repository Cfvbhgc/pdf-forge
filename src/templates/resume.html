<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume — {{name}}</title>
  <style>
    /* ===================================================================
       Resume Template — Inline Styles
       ===================================================================
       Clean, modern two-tone resume with a coloured sidebar for contact
       info and skills, and a white main area for experience & education.
       =================================================================== */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
      color: #1e293b;
      background: #ffffff;
      line-height: 1.5;
    }

    .resume-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0;
    }

    /* -- Header with name and title -- */
    .resume-header {
      background: linear-gradient(135deg, #4338ca, #6366f1);
      color: #ffffff;
      padding: 44px 48px 36px 48px;
      border-radius: 0 0 8px 8px;
    }

    .resume-header h1 {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .resume-contact {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 13px;
      opacity: 0.9;
    }

    .resume-contact span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* -- Summary section -- */
    .summary-section {
      padding: 28px 48px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }

    .summary-section p {
      font-size: 15px;
      color: #334155;
      line-height: 1.7;
    }

    /* -- Main content area -- */
    .resume-body {
      padding: 32px 48px;
    }

    /* -- Section headings -- */
    .section-title {
      font-size: 18px;
      font-weight: 800;
      color: #4338ca;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding-bottom: 8px;
      border-bottom: 3px solid #e0e7ff;
      margin-bottom: 20px;
      margin-top: 32px;
    }

    .section-title:first-child {
      margin-top: 0;
    }

    /* -- Skills chips container -- */
    .skills-container {
      padding: 4px 0 8px 0;
    }

    /* -- Education entries -- */
    .education-entry {
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="resume-wrapper">

    <!-- ============================================================= -->
    <!-- Header — name and contact details                             -->
    <!-- ============================================================= -->
    <div class="resume-header">
      <h1>{{name}}</h1>
      <div class="resume-contact">
        <span>{{email}}</span>
        <span>{{phone}}</span>
        <span>{{location}}</span>
        <span>{{website}}</span>
      </div>
    </div>

    <!-- ============================================================= -->
    <!-- Professional summary                                          -->
    <!-- ============================================================= -->
    <div class="summary-section">
      <p>{{summary}}</p>
    </div>

    <!-- ============================================================= -->
    <!-- Main body — Experience, Skills, Education                     -->
    <!-- ============================================================= -->
    <div class="resume-body">

      <!-- =========================================================== -->
      <!-- Work Experience                                             -->
      <!-- =========================================================== -->
      <div class="section-title">Experience</div>
      {{experienceHtml}}

      <!-- =========================================================== -->
      <!-- Skills                                                      -->
      <!-- =========================================================== -->
      <div class="section-title">Skills</div>
      <div class="skills-container">
        {{skillsHtml}}
      </div>

      <!-- =========================================================== -->
      <!-- Education                                                   -->
      <!-- =========================================================== -->
      <div class="section-title">Education</div>
      {{educationHtml}}

    </div>

  </div>
</body>
</html>
